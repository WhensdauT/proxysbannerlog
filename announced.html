<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонсы | Proxy's Banner Log</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
    <link rel="stylesheet" href="style.css?v=1">
    <link rel="stylesheet" href="grid.css?v=1">
    <link rel="stylesheet" href="particles.css?v=1">
    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .announcements-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .back-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .announcements-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
        /* Горизонтальная карточка */
        .ann-card {
            position: relative;
            width: 380px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .ann-card:hover {
            box-shadow: 0 0 30px rgba(255, 45, 149, 0.4);
            border-color: #ff2d95;
        }
        /* Основной блок: картинка + имя */
        .ann-card-main {
            position: relative;
            z-index: 2;
            background: #1a1a1a;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .ann-card:hover .ann-card-main {
            transform: translateY(-20px);
        }
        .ann-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #2a2a2a;
        }
        .ann-card-header {
            padding: 15px 15px 0;
            text-align: center;
        }
        .ann-card-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1.6rem;
            color: #ffd700;
            margin-bottom: 5px;
        }
        .ann-card-version {
            color: #9b9b9b;
            font-size: 0.9rem;
        }
        /* Панель с деталями (выезжает снизу) */
        .ann-details {
            background: #111;
            border-top: 1px solid #ff2d95;
            padding: 20px 15px;
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-radius: 0 0 20px 20px;
        }
        .ann-card:hover .ann-details {
            transform: translateY(0);
            opacity: 1;
        }
        /* Строка с атрибутами */
        .ann-attributes {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .ann-attribute-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #ccc;
            font-size: 0.8rem;
        }
        .ann-attribute-item img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .ann-attribute-emoji {
            font-size: 1.5rem;
        }
        /* Текст о персонаже */
        .ann-description {
            color: #bbb;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: center;
        }
        /* Дата выхода */
        .ann-release {
            text-align: center;
            color: #ffd700;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="announcements-page">
        <a href="hub.html" class="back-link">← В архив</a>
        <h1 class="neon-title" style="font-size:3rem; text-align:center; margin-bottom:40px;">Анонсы</h1>
        <div id="announcements-container" class="announcements-grid"></div>
    </div>

    <footer style="text-align:center; padding:30px; color:#555; border-top:1px solid rgba(255,255,255,0.05); margin-top:50px;">
        <p><a href="hub.html">← В архив</a> | <a href="index.html">На главную</a></p>
    </footer>

    <script>
        // Базовая папка для всех изображений анонсов
        const IMAGES_BASE = 'imagine/';

        // Заглушки-эмодзи для ситуаций, когда картинка не указана
        const defaultIcons = {
            faction: '🏛️',
            attribute: '⚡',
            element: '🗡️'
        };

        fetch('announced.json')
          .then(res => res.json())
          .then(data => {
              const container = document.getElementById('announcements-container');
              if (!data.length) {
                  container.innerHTML = '<p style="text-align:center;color:#777;width:100%;">Пока нет анонсированных персонажей.</p>';
                  return;
              }
              data.forEach(entry => {
                  // Картинка персонажа
                  let agentImageSrc = 'https://via.placeholder.com/380x200/1a1a1a/ffd700?text=' + encodeURIComponent(entry.agent);
                  if (entry.image && entry.image.trim() !== '') {
                      agentImageSrc = entry.image.startsWith('http') ? entry.image : IMAGES_BASE + entry.image;
                  }

                  // Функция для получения иконки (картинка или эмодзи)
                  const getIcon = (imageField, emoji) => {
                      if (entry[imageField] && entry[imageField].trim() !== '') {
                          const src = entry[imageField].startsWith('http') ? entry[imageField] : IMAGES_BASE + entry[imageField];
                          return `<img src="${src}" alt="" onerror="this.outerHTML='<span class=\'ann-attribute-emoji\'>${emoji}</span>';">`;
                      }
                      return `<span class="ann-attribute-emoji">${emoji}</span>`;
                  };

                  const factionIcon = getIcon('factionImage', defaultIcons.faction);
                  const attributeIcon = getIcon('attributeImage', defaultIcons.attribute);
                  const elementIcon = getIcon('elementImage', defaultIcons.element);

                  // Описание персонажа (берется из поля description в JSON)
                  const description = entry.description || 'Подробности появятся позже.';
                  const releaseDate = entry.estimatedRelease || 'Дата уточняется';

                  const card = document.createElement('div');
                  card.className = 'ann-card';
                  card.innerHTML = `
                    <div class="ann-card-main">
                        <img src="${agentImageSrc}" 
                             alt="${entry.agent}" 
                             class="ann-card-img" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/380x200/1a1a1a/ffd700?text=' + encodeURIComponent('${entry.agent}');">
                        <div class="ann-card-header">
                            <div class="ann-card-name">${entry.agent}</div>
                            <div class="ann-card-version">Версия ${entry.version}</div>
                        </div>
                    </div>
                    <div class="ann-details">
                        <!-- Иконки фракции, атрибута, типа -->
                        <div class="ann-attributes">
                            <div class="ann-attribute-item">
                                ${factionIcon}
                                <span>${entry.faction || 'Неизвестно'}</span>
                            </div>
                            <div class="ann-attribute-item">
                                ${attributeIcon}
                                <span>${entry.attribute || 'Неизвестно'}</span>
                            </div>
                            <div class="ann-attribute-item">
                                ${elementIcon}
                                <span>${entry.element || 'Неизвестно'}</span>
                            </div>
                        </div>
                        <!-- Текст о персонаже -->
                        <div class="ann-description">${description}</div>
                        <!-- Дата выхода -->
                        <div class="ann-release">📅 Выход: ${releaseDate}</div>
                    </div>
                  `;
                  container.appendChild(card);
              });
          })
          .catch(err => {
              console.error('Ошибка загрузки анонсов:', err);
              document.getElementById('announcements-container').innerHTML = '<p style="text-align:center;color:#777;width:100%;">Ошибка загрузки данных</p>';
          });
    </script>
</body>
</html>
