<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тех.работы | Proxy's Banner Log</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .maintenance-box {
            background: #1a1a1a;
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
            max-width: 500px;
            width: 90%;
        }
        .maintenance-icon { font-size: 4rem; margin-bottom: 20px; }
        .maintenance-title {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
            margin-bottom: 15px;
        }
        .maintenance-text { color: #9b9b9b; font-size: 1.1rem; margin-bottom: 10px; }
        
        /* Аудиоплеер */
        .audio-player {
            margin-top: 30px;
            background: #0f0f0f;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 45, 149, 0.2);
        }
        .audio-title {
            color: #ff2d95;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-shadow: 0 0 5px rgba(255, 45, 149, 0.5);
        }
        .track-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .track-btn {
            background: #2d2d2d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .track-btn:hover, .track-btn.active {
            background: #3d3d3d;
            border-color: #ff2d95;
            color: #ff2d95;
            box-shadow: 0 0 10px rgba(255, 45, 149, 0.3);
        }
        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            background: #1a1a1a;
        }
        audio::-webkit-media-controls-panel {
            background-color: #2d2d2d;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }
        .hint { color: #555; font-size: 0.85rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="maintenance-box">
        <div class="maintenance-icon">🛠️</div>
        <h1 class="maintenance-title">Технические работы</h1>
        <p class="maintenance-text">Сайт обновляется — добавляем новые баннеры!</p>
        <p class="maintenance-text">А пока можно послушать музыку 🎵</p>
        
        <!-- Аудиоплеер -->
        <div class="audio-player">
            <p class="audio-title">🎧 Саундтреки</p>
            <div class="track-list" id="track-list">
                <!-- Кнопки треков добавятся через JS -->
            </div>
            <audio id="audio-player" controls loop>
                Ваш браузер не поддерживает аудио.
            </audio>
        </div>
        
        <p class="hint">Обновление займёт 5–10 минут</p>
    </div>

    <script>
        // Плейлист — позже заменишь на свои файлы
        const tracks = [
            { name: "Come Alive", file: "audio/ComeAlive.mp3" },
            { name: "Cultivation Through Food", file: "audio/JuFufu.mp3" },
            { name: "Burning Desire", file: "audio/Burning Desire.mp3" },
            { name: "Yada!", file: "audio/Sunna.mp3" },
            { name: "PinKing", file: "audio/pinKing.mp3" },
            { name: "Original Me", file: "audio/OriginalMe.mp3" }
        ];
        
        const trackList = document.getElementById('track-list');
        const audioPlayer = document.getElementById('audio-player');
        let currentTrack = 0;
        
        // Создаём кнопки треков
        tracks.forEach((track, index) => {
            const btn = document.createElement('button');
            btn.className = 'track-btn' + (index === 0 ? ' active' : '');
            btn.textContent = track.name;
            btn.onclick = () => {
                document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTrack = index;
                audioPlayer.src = track.file;
                audioPlayer.play();
            };
            trackList.appendChild(btn);
        });
        
        // Загружаем первый трек
        if (tracks.length > 0) {
            audioPlayer.src = tracks[0].file;
        }
    </script>
</body>
</html>
