<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy's Banner Log | Баннеры ZZZ</title>
    <meta name="description" content="Архив всех баннеров Zenless Zone Zero с автоматическим счётчиком дней">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💿</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cover">
        <div class="video-background">
            <iframe 
                src="https://www.youtube.com/embed/ffubdFPFlS8?autoplay=1&mute=1&loop=1&playlist=ffubdFPFlS8&controls=0&showinfo=0&rel=0" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="cover-overlay"></div>
        <h1 class="neon-title">Proxy's Banner Log</h1>
        <p class="subtitle-small">Автоматический счётчик дней с последнего баннера каждого персонажа</p>
    </div>

    <!-- Секция "Скоро" -->
    <div class="upcoming-section">
        <h2 class="section-title">🔥 Скоро на баннерах</h2>
        <div class="upcoming-container" id="upcoming-container"></div>
    </div>

    <!-- Поиск -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Введите имя персонажа..." class="search-input">
    </div>

    <!-- Все персонажи -->
    <h2 class="section-title">📀 Все персонажи</h2>
    <div class="container" id="banner-container"></div>

    <div class="donate-section">
        <a href="https://boosty.to/proxysbannerlog" target="_blank" class="donate-button">
            💿 Поддержать проект
        </a>
    </div>

    <footer>
        <p>Данные обновляются автоматически • Неофициальный фанатский проект</p>
        <p>Сайт создан <a href="https://github.com/WhensdauT" target="_blank">WhensdauT</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
